name: agenda_allan
description: Agenda Allan — Flutter Web + Android com sincronização Firebase
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

  # Estado
  provider: ^6.1.1

  # Persistência local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase — sincronização em nuvem
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  google_sign_in: ^6.2.1

  # Notificações (mobile only)
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  crypto: ^3.0.3
  path_provider: ^2.1.2

  # Gráficos
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
