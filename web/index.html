<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Agenda Allan — sua agenda inteligente com gamificação RPG">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Agenda Allan">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Agenda Allan</title>
  <link rel="manifest" href="manifest.json">

  <!-- PWA theme color -->
  <meta name="theme-color" content="#0F0F1A">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Splash screen style -->
  <style>
    body {
      margin: 0;
      background-color: #0F0F1A;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn 0.6s ease;
    }
    #splash-icon {
      width: 96px;
      height: 96px;
      background: rgba(124, 58, 237, 0.15);
      border: 2px solid rgba(124, 58, 237, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    #splash-title {
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    #splash-sub {
      color: #94A3B8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(124,58,237,0.2);
      border-top-color: #9D5CF5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-icon">✨</div>
    <div id="splash-title">Agenda Allan</div>
    <div id="splash-sub">Carregando...</div>
    <div class="spinner"></div>
  </div>

  <script>
    // Register Service Worker (PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('flutter-first-frame', function () {
        navigator.serviceWorker.register('flutter_service_worker.js');
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
